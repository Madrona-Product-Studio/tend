<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#b23a2e" />

    <!-- Per-route titles/descriptions are set in the route components via React 19
         native document metadata. These are the site-wide defaults for crawlers. -->
    <title>Tend — map and manage your garden</title>
    <meta
      name="description"
      content="Tend helps home gardeners map, organize, and improve their food gardens year over year — a beautiful, spatially-true map of zones, beds, plants, and the systems that serve them."
    />
    <link rel="canonical" href="https://tend.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tend" />
    <meta property="og:title" content="Tend — map and manage your garden" />
    <meta property="og:description" content="A beautiful, spatially-true map of your food garden — zones, beds, plants, and the systems that serve them." />
    <meta property="og:url" content="https://tend.app/" />
    <meta property="og:image" content="https://tend.app/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tend — map and manage your garden" />
    <meta name="twitter:description" content="A beautiful, spatially-true map of your food garden — zones, beds, plants, and the systems that serve them." />
    <meta name="twitter:image" content="https://tend.app/og.png" />

    <!-- Fonts: Inter (swiss/zen sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- JSON-LD: the studio SEO standard's flagged gap — Tend ships it from day one. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Tend",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "description": "Map, organize, and improve your food garden year over year.",
        "url": "https://tend.app/",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
